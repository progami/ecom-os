name: Deploy to AWS

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: ecom-os
  TF_WORKING_DIR: infra/terraform

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist
        run: |
          set -euo pipefail
          for repo in "${PROJECT_NAME}-ecomos" "${PROJECT_NAME}-wms" "${PROJECT_NAME}-x-plan" "${PROJECT_NAME}-website"; do
            echo "Ensuring repository ${repo}"
            aws ecr describe-repositories --repository-names "${repo}" >/dev/null 2>&1 || aws ecr create-repository --repository-name "${repo}" >/dev/null
          done
        env:
          PROJECT_NAME: ${{ env.PROJECT_NAME }}

      - name: Set image tag
        run: |
          echo "ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}" >> "$GITHUB_ENV"
          echo "TF_VAR_image_tag=${GITHUB_SHA}" >> "$GITHUB_ENV"
        env:
          PROJECT_NAME: ${{ env.PROJECT_NAME }}

      - name: Build and push Docker images
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and push portal image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/ecomos/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}-ecomos:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}-ecomos:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Build and push WMS image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/wms/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}-wms:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}-wms:latest
          cache-from: type=local,src=/tmp/.buildx-cache-new
          cache-to: type=local,dest=/tmp/.buildx-cache-new2,mode=max

      - name: Build and push X-Plan image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/x-plan/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}-x-plan:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}-x-plan:latest
          cache-from: type=local,src=/tmp/.buildx-cache-new2
          cache-to: type=local,dest=/tmp/.buildx-cache-new3,mode=max

      - name: Build and push website image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/website/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}-website:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ env.PROJECT_NAME }}-website:latest
          cache-from: type=local,src=/tmp/.buildx-cache-new3
          cache-to: type=local,dest=/tmp/.buildx-cache-final,mode=max

      - name: Move Docker cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-final /tmp/.buildx-cache

      - name: Prepare Terraform variable environment
        run: |
          set -euo pipefail
          cat <<'EOF' > /tmp/export-env.py
import json
import os

def parse_env(text: str) -> dict[str, str]:
    result: dict[str, str] = {}
    for raw in text.splitlines():
        line = raw.strip()
        if not line or line.startswith("#"):
            continue
        if "=" not in line:
            continue
        key, value = line.split("=", 1)
        result[key.strip()] = value.strip()
    return result

mapping = {
    "TF_VAR_ecomos_environment": os.environ.get("ECOMOS_ENV", ""),
    "TF_VAR_wms_environment": os.environ.get("WMS_ENV", ""),
    "TF_VAR_xplan_environment": os.environ.get("XPLAN_ENV", ""),
    "TF_VAR_website_environment": os.environ.get("WEBSITE_ENV", ""),
}

with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as fh:
    for key, raw in mapping.items():
        data = parse_env(raw)
        fh.write(f"{key}={json.dumps(data)}\n")
EOF
          python /tmp/export-env.py
          {
            echo "TF_VAR_portal_domain=${{ vars.PORTAL_DOMAIN }}"
            echo "TF_VAR_website_domain=${{ vars.WEBSITE_DOMAIN }}"
            echo "TF_VAR_cookie_domain=${{ vars.COOKIE_DOMAIN || '.targonglobal.com' }}"
            echo "TF_VAR_db_username=${{ secrets.RDS_MASTER_USERNAME }}"
            echo "TF_VAR_db_password=${{ secrets.RDS_MASTER_PASSWORD }}"
          } >> "$GITHUB_ENV"
        env:
          ECOMOS_ENV: ${{ secrets.ECOMOS_ENV }}
          WMS_ENV: ${{ secrets.WMS_ENV }}
          XPLAN_ENV: ${{ secrets.XPLAN_ENV }}
          WEBSITE_ENV: ${{ secrets.WEBSITE_ENV }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -input=false -auto-approve tfplan
